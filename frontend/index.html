<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocArmor</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>📄 DocArmor</h1>

    <div class="card">

        <div class="tabs">
            <button id="loginTab">Login</button>
            <button id="registerTab">Register</button>
        </div>

        <div id="message"></div>

        <input
            type="text"
            id="name"
            placeholder="Name (Register only)"
        >

        <input
            type="email"
            id="email"
            placeholder="Email"
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
        >

        <button id="submitBtn">
            Login
        </button>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
